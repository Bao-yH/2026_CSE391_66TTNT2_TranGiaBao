## 5. HOẠT ĐỘNG 3 (40’): THAO TÁC DOM \& SỰ KIỆN

### 5.1. Chuẩn bị HTML

Thêm vào trang (hoặc tạo file mới):

```html
<section>
  <h2>DOM & Sự kiện</h2>
  <p id="status">Chưa có tương tác...</p>

  <button id="btnHello">Chào</button>
  <button id="btnRed">Đổi màu nền thành đỏ</button>

  <div style="margin-top: 20px;">
    <label>Nhập tên: </label>
    <input id="nameInput" type="text" />
    <p id="greeting"></p>
  </div>
</section>

<script src="dom.js"></script>
```

Tạo file `dom.js`:

```js
const statusEl = document.getElementById("status");
const btnHello = document.getElementById("btnHello");

btnHello.addEventListener("click", function () {
  statusEl.textContent = "Xin chào! Đây là nội dung được thay đổi bằng JavaScript.";
});
```


---

### 5.2. Nhiệm vụ cho sinh viên

#### Bước 1: Đọc \& giải thích

> Câu hỏi:
> - `document.getElementById("status")` đang làm gì? -> Để tìm và lấy phần tử html có id là "status" trong trang web sau đó gán vào biến statusEl để java có thể thay đổi nội dung hoặc thuộc tính của phân ftuwr đó.
> - Sự kiện `"click"` xảy ra khi nào? -> khi người dùng nhấp chuột vào nút hoặc phần tử trên trang web.
> - Trong đoạn code trên, khi nhấn nút `btnHello`, điều gì thay đổi trên trang?-> Xin chào! Đây là nội dung được thay đổi bằng JavaScript.

---

#### Bước 2: Thử nghiệm nút đổi màu nền

Hoàn thiện code:

```js
const btnRed = document.getElementById("btnRed");

btnRed.addEventListener("click", function () {
  // TODO: Đổi màu nền trang thành đỏ
  document.body.style.backgroundColor = "red";
});
```

> Câu hỏi:
> - Em có thể đổi sang màu khác (vd. `lightblue`) không? Hãy thử. 
> - có thể đổi sang màu khác đổi red=lightblue
> - Em hãy ghi lại 1 ví dụ khác mà JavaScript có thể làm với `document.body.style`.
> - Đổi màu chữ cửa trang :document.body.style.color = "white";

---

#### Bước 3: Xử lý sự kiện input – gõ tên, hiện lời chào

Hoàn thiện code:

```js
const nameInput = document.getElementById("nameInput");
const greeting = document.getElementById("greeting");

nameInput.addEventListener("input", function () {
  const value = nameInput.value;
  greeting.textContent = "Xin chào, " + value + "!";
});
```

> Câu hỏi:
> - Sự kiện `"input"` khác gì so với `"click"`?
> - input xảy ra khi gõ bàn phím / thay đổi nội dung còn click xảy ra khi bấm chuột
> - Khi em xoá hết nội dung ô input, dòng `greeting` hiển thị gì?-> dòng đó hiển thị "Xin chào, !"

---

#### Bước 4: Liên hệ khái niệm DOM

> DOM (Document Object Model) là mô hình biểu diễn trang HTML dưới dạng một **cây các đối tượng** mà JavaScript có thể truy cập và thay đổi.
>
> Em hãy:
> - Tự mô tả DOM bằng lời của em:
>   DOM là cấu trúc biểu diễn trang HTML dưới dạng 1 cây các phần tử . Nhờ DOM, javaScript có thể truy cập, thay đổi nội dung, kiểu dáng thêm hoặc xóa các phần tử trên trang web.
> - Nêu 1 ví dụ “thao tác DOM” trong bài (ghi lại 1 dòng lệnh cụ thể).
"document.getElementById("status").textContent = "Xin chào!";"
Dòng lệnh này dùng để tìm phần tử có id là status và thay đổi nội dung của nó trên trang web

