#### Bước 3: Thử nghiệm biến \& kiểu dữ liệu trong Console

Trong tab Console, gõ từng dòng sau và ghi lại kết quả:

```js
let age = 20;
const name = "An";
let isStudent = true;

typeof age;
typeof name;
typeof isStudent;

1 + 2 * 3;
"Hello " + "world";
```

> Câu hỏi:
> - Kết quả `typeof age` là gì?
> - Kết quả là 'number'
> - Kết quả `typeof name` là gì?
> - Kết quả là 'string'
> - Kết quả `typeof isStudent` là gì?
> - kết quả là 'boolean'
> - Em hãy tự mô tả ngắn gọn:
>   - `number` là: kiểu dữ liệu dùng để lưu trữ các giá trị số
>   - `string` là: kiểu dữ liệu dùng để lưu trữ văn bản được đặt trong dấu nháy đơn hoặc kép
>   - `boolean` là: kiểu dữ liệu chỉ có 2 giá trị là true hoặc false, thường dùng trong điều kiện

