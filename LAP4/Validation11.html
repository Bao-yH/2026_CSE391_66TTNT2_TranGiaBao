<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Form đăng ký</title>

<style>

.error{
color:red;
font-size:14px;
}

</style>

</head>

<body>

<h2>Đăng ký tài khoản</h2>

<form id="registerForm">

<p>
Họ và tên
<input type="text" id="fullname" maxlength="50">
<span id="nameCount">0/50</span>
<span class="error" id="fullnameError"></span>
</p>

<p>
Email
<input type="text" id="email">
<span class="error" id="emailError"></span>
</p>

<p>
Số điện thoại
<input type="text" id="phone">
<span class="error" id="phoneError"></span>
</p>

<p>
Mật khẩu
<input type="password" id="password">
<button type="button" id="togglePassword">👁</button>

<div id="strengthBar" style="width:200px;height:10px;background:#ddd;margin-top:5px">
<div id="strengthLevel" style="height:100%;width:0%"></div>
</div>

<span id="strengthText"></span>
<span class="error" id="passwordError"></span>
</p>

<p>
Xác nhận mật khẩu
<input type="password" id="confirmPassword">
<span class="error" id="confirmError"></span>
</p>

<p>
Giới tính
<input type="radio" name="gender" value="Nam">Nam
<input type="radio" name="gender" value="Nữ">Nữ
<span class="error" id="genderError"></span>
</p>

<p>
<input type="checkbox" id="terms">
Tôi đồng ý điều khoản
<span class="error" id="termsError"></span>
</p>

<button type="submit">Đăng ký</button>

</form>

<h3 id="successMessage"></h3>

<script src="Validation11.js"></script>

</body>
</html>
